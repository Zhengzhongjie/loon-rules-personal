name: Loon rule drift

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: pip install pytest

      - name: Compile tools
        run: python3 -m py_compile tools/*.py

      - name: Unit tests
        run: python3 -m pytest -q

      - name: Audit public artifacts
        run: python3 tools/audit_public_artifacts.py .

  drift:
    # Networked: fetches upstream. Keep off per-push runs; weekly + manual only.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check generated rule drift
        run: python3 tools/check_loon_rule_drift.py --diff --max-diff-lines 200
