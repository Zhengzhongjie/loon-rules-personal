name: Loon rule drift

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check generated rule drift
        run: python3 tools/check_loon_rule_drift.py --diff --max-diff-lines 200

      - name: Audit public artifacts
        run: python3 tools/audit_public_artifacts.py .

      - name: Compile tools
        run: python3 -m py_compile tools/*.py
